<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../CSS/créer_un_compte.css">
    <title>Créer un compte</title>
</head>
<body>
    <img src="../image/ReadyToWork (3).png" alt="logo" class="logo">
    <div class="container">
    <div class="form">
        <h2>Créer votre compte</h2>

        <div class="inputBox">
            <input type="text" placeholder="Nom d'utilisateur">
        </div>

        <div class="inputBox">
            <input type="password" placeholder="Mot de passe">
        </div>

        <div class="inputBox">
            <input type="submit" value="Créer le compte">
        </div>
    </div>
</div>
