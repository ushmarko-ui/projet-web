<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <title>Connexion</title>
    <link rel="stylesheet" href="../CSS/PageConnexion.css" />
  </head>
  <body>
    <div class="container">
      <!-- Image du haut (profil utilisateur) -->
      <img
        src="/image/Capture d'écran 2026-02-08 131929.png"
        class="banner"
        alt="Profil utilisateur"
      />

      <!-- Icône de profil -->
      <img
        src="/image/Capture d'écran 2026-02-12 091204.png"
        class="icon"
        alt="Icône profil"
      />

      <!-- Champs de connexion -->
      <input type="text" placeholder="Nom d’utilisateur..." class="input" />
      <input type="password" placeholder="Mot de passe..." class="input" />

      <!-- Bouton -->
      <button class="btn">Se connecter</button>
    </div>
  </body>
</html>
