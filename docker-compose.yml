version: "3.8"

services:
  db:
    image: mysql:8.0
    container_name: stage_explorer_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: stage_explorer
      MYSQL_USER: user_stage
      MYSQL_PASSWORD: password_stage
    ports:
      - "3307:3306"
    volumes:
      - ./init:/docker-entrypoint-initdb.d


  www:
    image: php:8.2-apache
    container_name: stage_explorer_www
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
    depends_on:
      - db