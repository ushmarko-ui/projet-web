<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Stage Explorer</title>
    <link rel="shortcut icon" href="./image/logo.png" />

    <link rel="stylesheet" href="./CSS/base.css" />
    <link rel="stylesheet" href="./CSS/header.css" />
    <link rel="stylesheet" href="./CSS/nav.css" />
    <link rel="stylesheet" href="./CSS/search.css" />
    <link rel="stylesheet" href="./CSS/Boutonscv.css" />
    <link rel="stylesheet" href="./CSS/profil.css" />
    <link rel="stylesheet" href="./CSS/footer.css" />
    
    <style>
      /* Style pour le bouton spécial Pilote */
      #btn-ajout-etudiant {
        background-color: #6200ea; 
        color: white;
        font-weight: bold;
        border-radius: 5px;
      }
      #btn-logout {
        background-color: #cc0000;
        color: white;
        border-radius: 5px;
      }
    </style>
  </head>

  <body>
    <div class="banniere-haut"></div>
    <header>
      <div class="barre-nav">
        <a href="./Index.html" class="lien-logo">
          <img src="./image/logo.png" alt="Logo" class="logo" />
          <span class="site-name">Stage Explorer</span>
        </a>
        <a href="HTML/choix_role.html" class="lien-profil">
          <img src="image/image_reunion.avif" alt="Profil" class="profil" />
          <span>Mon Profil</span>
        </a>
      </div>

      <div class="hero-title">
        <h1>Stage Explorer</h1>
      </div>
    </header>

    <nav>
      <hr />
      <div class="boutons">
        <a href="./HTML/Trouver_mon_stage.html">Trouver mon stage</a>
        <a href="./HTML/Trouver_une_entreprise.html">Trouver une entreprise</a>
        <a href="./HTML/messagerie.html">Messagerie</a>
        <a href="./HTML/notification.html">Notification</a>
        
        <a href="HTML/gestion_etudiants.html" id="btn-ajout-etudiant" style="display: none;">Ajouts d'étudiant</a>
        <a href="./HTML/page_connexion.html" id="btn-login">Se connecter</a>
        <a href="#" id="btn-logout" style="display: none;">Déconnexion</a>
      </div>
      <hr />
    </nav>

    <div class="recherche">
      <form>
        <input type="text" id="secteur" placeholder="Rechercher par job, mot-clé ou entreprise" />
        <button class="bouton-recherche" type="submit">Rechercher</button>

        <input type="text" id="zone" placeholder="Où" />
        <button class="bouton-recherche" type="submit">Rechercher</button>
      </form>
    </div>

    <section class="section-cv">
      <h2>Offres Récentes</h2>
      <div class="offres">
        <img src="./image/offres.png" />
        <img src="./image/offres.png" />
        <img src="./image/offres.png" />
      </div>
      <div class="raccourcis">
        <div class="raccourcis_candidature">
          <div class="couleur1"><img src="./image/SuivreCanditatures.png" /></div>
          <div class="premier_raccourcis">
            <h3>Suivez votre candidature</h3>
            <p>Gardez le contrôle à chaque étape.</p>
            <button class="bouton_raccourcis">Voir mes candidatures</button>
          </div>
        </div>
        </div>
      <a href="./HTML/postule-cv.html" class="bouton-postule">
        <span class="postuler">Déposer un CV</span>
      </a>
    </section>

    <footer>
      <div class="lien-footer">
        <a href="./HTML/politique.html">Politique de confidentialité</a>
        <a href="./HTML/mentions.html">mentions légales</a>
      </div>
    </footer>

    <script>
      document.addEventListener("DOMContentLoaded", function() {
        const userRole = localStorage.getItem('userRole'); 
        const btnAjout = document.getElementById('btn-ajout-etudiant');
        const btnLogin = document.getElementById('btn-login');
        const btnLogout = document.getElementById('btn-logout');

        if (userRole === 'pilote') {
          btnAjout.style.display = 'inline-block';
          btnLogin.style.display = 'none';
          btnLogout.style.display = 'inline-block';
        }

        // Action de déconnexion
        btnLogout.onclick = function() {
          localStorage.removeItem('userRole');
          window.location.reload();
        };
      });
    </script>
  </body>
</html>
